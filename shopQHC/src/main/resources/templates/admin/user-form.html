<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Form tài khoản</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-layout">
    <aside class="sidebar">
        <h2>ADMIN PANEL</h2>
        <ul>
            <li><a th:href="@{/admin/dashboard}">Dashboard</a></li>
            <li><a th:href="@{/admin/categories}">Quản lý danh mục</a></li>
            <li><a th:href="@{/admin/products}">Quản lý sản phẩm</a></li>
            <li><a th:href="@{/admin/users}">Quản lý người dùng</a></li>
            <li><a th:href="@{/admin/orders}">Quản lý đơn hàng</a></li>
            <li><a th:href="@{/admin/coupons}">Quản lý mã giảm giá</a></li>
            <li><a th:href="@{/admin/statistics}">Thống kê</a></li>
            <li>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-danger" style="width: 100%;">
                        Đăng xuất
                    </button>
                </form>
            </li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <div>
                <h1 th:text="${pageTitle}"></h1>
                <p>Nhập thông tin tài khoản</p>
            </div>
            <a class="btn btn-secondary" th:href="@{/admin/users}">← Quay lại</a>
        </div>

        <div th:if="${errorMessage}" class="alert error" th:text="${errorMessage}"></div>

        <div class="form-wrapper">
            <form th:action="@{${formAction}}" th:object="${userRequest}" method="post" class="admin-form">
                <div class="form-group">
                    <label>Họ tên</label>
                    <input type="text" th:field="*{fullName}">
                    <small class="error" th:errors="*{fullName}"></small>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" th:field="*{username}">
                        <small class="error" th:errors="*{username}"></small>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" th:field="*{email}">
                        <small class="error" th:errors="*{email}"></small>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Số điện thoại</label>
                        <input type="text" th:field="*{phone}">
                    </div>

                    <div class="form-group">
                        <label>Mật khẩu</label>
                        <input type="password" th:field="*{password}" placeholder="Để trống nếu không đổi">
                    </div>
                </div>

                <div class="form-group">
                    <label>Địa chỉ</label>
                    <input type="text" th:field="*{address}">
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Quyền</label>
                        <select th:field="*{role}">
                            <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Trạng thái</label>
                        <select th:field="*{status}">
                            <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
                        </select>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Lưu tài khoản</button>
                    <a class="btn btn-secondary" th:href="@{/admin/users}">Hủy</a>
                </div>
            </form>
        </div>
    </main>
</div>
</body>
</html>
