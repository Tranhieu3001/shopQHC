<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Mã giảm giá</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div class="admin-layout">

    <aside class="sidebar">
        <h2>ADMIN PANEL</h2>
        <ul>
            <li><a th:href="@{/admin/dashboard}">Dashboard</a></li>
            <li><a th:href="@{/admin/categories}">Quản lý danh mục</a></li>
            <li><a th:href="@{/admin/products}">Quản lý sản phẩm</a></li>
            <li><a th:href="@{/admin/users}">Quản lý người dùng</a></li>
            <li><a th:href="@{/admin/orders}">Quản lý đơn hàng</a></li>
            <li class="active"><a th:href="@{/admin/coupons}">Quản lý mã giảm giá</a></li>
            <li><a th:href="@{/admin/statistics}">Thống kê</a></li>
            <li>
                <form th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-danger" style="width: 100%;">
                        Đăng xuất
                    </button>
                </form>
            </li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <div>
                <h1 class="page-title" th:text="${pageTitle}">Mã giảm giá</h1>
                <p class="sub-title">Nhập thông tin coupon</p>
            </div>
            <a th:href="@{/admin/coupons}" class="btn btn-secondary">← Danh sách mã</a>
        </div>

        <div th:if="${errorMessage}" class="alert error" th:text="${errorMessage}"></div>

        <div class="form-wrapper">
            <form th:action="@{${formAction}}" method="post" class="admin-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-grid">
                    <div class="form-group">
                        <label>Mã giảm giá</label>
                        <input type="text" name="code" th:value="${coupon.code}" required>
                    </div>

                    <div class="form-group">
                        <label>Loại giảm giá</label>
                        <select name="discountType" class="form-control" required>
                            <option th:each="type : ${discountTypes}"
                                    th:value="${type}"
                                    th:selected="${type == coupon.discountType}"
                                    th:text="${type.name() == 'PERCENT' ? 'Phần trăm' : 'Tiền mặt'}">
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Giá trị giảm</label>
                        <input type="number" step="0.01" name="discountValue" th:value="${coupon.discountValue}" required>
                    </div>

                    <div class="form-group">
                        <label>Đơn tối thiểu</label>
                        <input type="number" step="0.01" name="minOrderValue" th:value="${coupon.minOrderValue}" required>
                    </div>

                    <div class="form-group">
                        <label>Ngày bắt đầu</label>
                        <input type="datetime-local"
                               name="startDate"
                               th:value="${coupon.startDate != null ? #temporals.format(coupon.startDate, 'yyyy-MM-dd''T''HH:mm') : ''}"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Ngày kết thúc</label>
                        <input type="datetime-local"
                               name="endDate"
                               th:value="${coupon.endDate != null ? #temporals.format(coupon.endDate, 'yyyy-MM-dd''T''HH:mm') : ''}"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Số lượng</label>
                        <input type="number" name="quantity" th:value="${coupon.quantity}" required>
                    </div>

                    <div class="form-group">
                        <label>Trạng thái</label>
                        <select name="status" class="form-control" required>
                            <option th:each="st : ${statuses}"
                                    th:value="${st}"
                                    th:selected="${st == coupon.status}"
                                    th:text="${st.name() == 'ACTIVE' ? 'Hoạt động' : 'Ngưng hoạt động'}">
                            </option>
                        </select>
                    </div>
                </div>

                <div style="margin-top: 20px;">
                    <button type="submit" class="btn btn-primary">Lưu</button>
                    <a th:href="@{/admin/coupons}" class="btn btn-secondary">Hủy</a>
                </div>
            </form>
        </div>
    </main>
</div>

</body>
</html>
