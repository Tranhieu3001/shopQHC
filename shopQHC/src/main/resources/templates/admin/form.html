<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Form sản phẩm</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-layout">
    <aside class="sidebar">
        <h2>ADMIN PANEL</h2>
        <ul>
            <li><a th:href="@{/admin/dashboard}">Dashboard</a></li>
            <li><a th:href="@{/admin/categories}">Quản lý danh mục</a></li>
            <li><a th:href="@{/admin/products}">Quản lý sản phẩm</a></li>
            <li><a th:href="@{/admin/users}">Quản lý người dùng</a></li>
            <li><a th:href="@{/admin/orders}">Quản lý đơn hàng</a></li>
            <li><a th:href="@{/admin/coupons}">Quản lý mã giảm giá</a></li>
            <li><a th:href="@{/admin/statistics}">Thống kê</a></li>
            <li>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-danger" style="width: 100%;">
                        Đăng xuất
                    </button>
                </form>
            </li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <div>
                <h1 th:text="${pageTitle}"></h1>
                <p>Nhập đầy đủ thông tin sản phẩm</p>
            </div>
            <a class="btn btn-secondary" th:href="@{/admin/products}">← Quay lại</a>
        </div>

        <div class="form-wrapper">
            <form th:action="@{${formAction}}" th:object="${productRequest}" method="post" class="admin-form">

                <div class="form-group">
                    <label>Tên sản phẩm</label>
                    <input type="text" th:field="*{name}">
                    <small class="error" th:errors="*{name}"></small>
                </div>

                <div class="form-group">
                    <label>Mô tả</label>
                    <textarea th:field="*{description}" rows="4"></textarea>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Giá</label>
                        <input type="number" step="0.01" th:field="*{price}">
                        <small class="error" th:errors="*{price}"></small>
                    </div>

                    <div class="form-group">
                        <label>Số lượng tồn</label>
                        <input type="number" th:field="*{stockQuantity}">
                        <small class="error" th:errors="*{stockQuantity}"></small>
                    </div>
                </div>

                <div class="form-group">
                    <label>URL hình ảnh</label>
                    <input type="text" th:field="*{imageUrl}">
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Màu sắc</label>
                        <input type="text" th:field="*{color}">
                    </div>

                    <div class="form-group">
                        <label>Thương hiệu</label>
                        <input type="text" th:field="*{brand}">
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Nhóm tuổi</label>
                        <input type="text" th:field="*{ageGroup}" placeholder="Ví dụ: 3-5 tuổi">
                    </div>

                    <div class="form-group">
                        <label>Giới tính</label>
                        <select th:field="*{gender}">
                            <option value="">-- Chọn giới tính --</option>
                            <option th:each="g : ${genders}" th:value="${g}" th:text="${g}"></option>
                        </select>
                        <small class="error" th:errors="*{gender}"></small>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Danh mục</label>
                        <select th:field="*{categoryId}">
                            <option value="">-- Chọn danh mục --</option>
                            <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                        </select>
                        <small class="error" th:errors="*{categoryId}"></small>
                    </div>

                    <div class="form-group">
                        <label>Trạng thái</label>
                        <select th:field="*{status}">
                            <option value="">-- Chọn trạng thái --</option>
                            <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
                        </select>
                        <small class="error" th:errors="*{status}"></small>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Số lượng đã bán</label>
                        <input type="number" th:field="*{soldQuantity}">
                        <small class="error" th:errors="*{soldQuantity}"></small>
                    </div>

                    <div class="form-group">
                        <label>Sản phẩm mới</label>
                        <select th:field="*{isNew}">
                            <option th:value="true">Có</option>
                            <option th:value="false">Không</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Lưu sản phẩm</button>
                    <a class="btn btn-secondary" th:href="@{/admin/products}">Hủy</a>
                </div>
            </form>
        </div>
    </main>
</div>
</body>
</html>
