<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${pageTitle}">Mã giảm giá</title>
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="main-content">
  <div class="page-header">
    <div>
      <h1 class="page-title" th:text="${pageTitle}">Mã giảm giá</h1>
      <p class="sub-title">Nhập thông tin coupon</p>
    </div>
    <a th:href="@{/admin/coupons}" class="btn btn-secondary">← Danh sách mã</a>
  </div>

  <div th:if="${errorMessage}" class="alert error" th:text="${errorMessage}"></div>

  <div class="form-wrapper">
    <form th:action="@{${formAction}}" method="post" class="admin-form">
      <div class="form-grid">
        <div class="form-group">
          <label>Mã giảm giá</label>
          <input type="text" name="code" th:value="${coupon.code}" required>
        </div>

        <div class="form-group">
          <label>Loại giảm giá</label>
          <select name="discountType" required>
            <option th:each="type : ${discountTypes}"
                    th:value="${type}"
                    th:text="${type}"
                    th:selected="${type == coupon.discountType}">
            </option>
          </select>
        </div>

        <div class="form-group">
          <label>Giá trị giảm</label>
          <input type="number" step="0.01" name="discountValue" th:value="${coupon.discountValue}" required>
        </div>

        <div class="form-group">
          <label>Đơn tối thiểu</label>
          <input type="number" step="0.01" name="minOrderValue" th:value="${coupon.minOrderValue}" required>
        </div>

        <div class="form-group">
          <label>Ngày bắt đầu</label>
          <input type="datetime-local"
                 name="startDate"
                 th:value="${coupon.startDate != null ? #temporals.format(coupon.startDate, 'yyyy-MM-dd''T''HH:mm') : ''}"
                 required>
        </div>

        <div class="form-group">
          <label>Ngày kết thúc</label>
          <input type="datetime-local"
                 name="endDate"
                 th:value="${coupon.endDate != null ? #temporals.format(coupon.endDate, 'yyyy-MM-dd''T''HH:mm') : ''}"
                 required>
        </div>

        <div class="form-group">
          <label>Số lượng</label>
          <input type="number" name="quantity" th:value="${coupon.quantity}" required>
        </div>

        <div class="form-group">
          <label>Trạng thái</label>
          <select name="status" required>
            <option th:each="st : ${statuses}"
                    th:value="${st}"
                    th:text="${st}"
                    th:selected="${st == coupon.status}">
            </option>
          </select>
        </div>
      </div>

      <div style="margin-top: 20px;">
        <button type="submit" class="btn btn-primary">Lưu</button>
        <a th:href="@{/admin/coupons}" class="btn btn-secondary">Hủy</a>
      </div>
    </form>
  </div>
</div>
</body>
</html>
