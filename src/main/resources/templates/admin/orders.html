<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý đơn hàng</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="main-content">
    <div class="page-header">
        <div>
            <h1 class="page-title">Quản lý đơn hàng</h1>
            <p class="sub-title">Theo dõi danh sách đơn hàng và trạng thái xử lý</p>
        </div>
        <a th:href="@{/admin/dashboard}" class="btn btn-secondary">
            ← Quay lại trang quản trị
        </a>
    </div>

    <div class="card">
        <form method="get" th:action="@{/admin/orders}" class="filter-form">
            <input type="text"
                   name="keyword"
                   class="form-control"
                   placeholder="Nhập tên người nhận hoặc số điện thoại"
                   th:value="${keyword}">

            <select name="orderStatus" class="form-control">
                <option value="">-- Tất cả trạng thái --</option>
                <option th:each="st : ${statuses}"
                        th:value="${st}"
                        th:selected="${st == selectedStatus}"
                        th:text="${st.name() == 'PENDING' ? 'Chờ xác nhận' :
                                 (st.name() == 'CONFIRMED' ? 'Đã xác nhận' :
                                 (st.name() == 'SHIPPING' ? 'Đang giao hàng' :
                                 (st.name() == 'COMPLETED' ? 'Hoàn thành' :
                                 (st.name() == 'CANCELLED' ? 'Đã hủy' : st.name()))))}">
                </option>
            </select>

            <button type="submit" class="btn btn-primary">Lọc</button>
            <a th:href="@{/admin/orders}" class="btn btn-secondary">Đặt lại</a>
        </form>
    </div>

    <div class="table-wrapper">
        <table class="admin-table">
            <thead>
            <tr>
                <th>Mã đơn</th>
                <th>Khách hàng</th>
                <th>Số điện thoại</th>
                <th>Tổng tiền</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="o : ${orders}">
                <td th:text="${o.id}"></td>
                <td th:text="${o.receiverName}"></td>
                <td th:text="${o.receiverPhone}"></td>
                <td th:text="${#numbers.formatDecimal(o.finalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                <td>
                    <span th:class="'badge ' + ${o.orderStatus.name().toLowerCase()}">
                        <span th:switch="${o.orderStatus.name()}">
                            <span th:case="'PENDING'">Chờ xác nhận</span>
                            <span th:case="'CONFIRMED'">Đã xác nhận</span>
                            <span th:case="'SHIPPING'">Đang giao hàng</span>
                            <span th:case="'COMPLETED'">Hoàn thành</span>
                            <span th:case="'CANCELLED'">Đã hủy</span>
                            <span th:case="*">Không xác định</span>
                        </span>
                    </span>
                </td>
                <td>
                    <a th:href="@{/admin/orders/{id}(id=${o.id})}" class="btn btn-primary">Xem chi tiết</a>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(orders)}">
                <td colspan="6" class="text-center">Không có đơn hàng nào</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
